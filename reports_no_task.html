<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Task Employees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f4f4f4;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #222;
            color: white;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        .manager-list {
            line-height: 1.5;
            white-space: normal;
        }
    </style>
</head>
<body>

    <h2>No Task Employees - Today</h2>

    <label>
        <input type="checkbox" id="includeCEO" />
        Include CEO (Ankit Anil Bhargava)
    </label>

    <br />

    <button onclick="run()">Fetch No Task Data</button>
    <button onclick="exportCSV()" id="exportBtn" style="display:none;">
        Export CSV
    </button>

    <p id="status"></p>

    <table>
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Employee Name</th>
                <th>Managers</th>
            </tr>
        </thead>
        <tbody id="results"></tbody>
    </table>

<script>
let latestData = [];
const BASE_URL = "https://api.employee.foxberry.link/v1/emp";

async function post(url, body) {
    const response = await fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
    });

    return response.json();
}

async function getManagers() {
    const response = await post(`${BASE_URL}/getallemp1`, {
        empId: "",
        name: "",
        label: "",
        resourceType: "",
        experience: "",
        isApproved: "",
        documentsPerPage: 500,
        page: 1
    });

    const employees = response.data || [];

    const managers = employees.filter(emp =>
        emp.resourceType === "manager" ||
        emp.resourceType === "teamlead" ||
        emp.resourceType === "humanResource"
    );

    return managers.map(emp => ({
        empId: emp.empId,
        name: `${emp.firstName || ""} ${emp.lastName || ""}`.trim(),
        designation: emp.designation
    }));
}

async function getNoTaskEmployees(managerName) {
    const response = await post(`${BASE_URL}/noAssignedTaskEmp1`, {
        taskDate: "",
        lead: managerName,
        empId: "",
        name: "",
        department: "",
        designation: "",
        documentsPerPage: 100,
        page: 1
    });

    return response.data || [];
}

function renderTable(data) {
    const tbody = document.getElementById("results");

    tbody.innerHTML = data.map(row => `
        <tr>
            <td>${escapeHtml(row.empId)}</td>
            <td>${escapeHtml(row.name)}</td>
            <td class="manager-list">${row.managers.map(escapeHtml).join("<br>")}</td>
        </tr>
    `).join("");
}

function exportCSV() {
    if (!latestData.length) {
        alert("No data to export.");
        return;
    }

    const headers = ["Employee ID", "Employee Name", "Managers"];

    const rows = latestData.map(emp => [
        emp.empId,
        emp.name,
        emp.managers.join(" | ")
    ]);

    const csvContent = [
        headers.join(","),
        ...rows.map(row =>
            row.map(value => `"${String(value ?? "").replace(/"/g, '""')}"`).join(",")
        )
    ].join("\n");

    const blob = new Blob([csvContent], {
        type: "text/csv;charset=utf-8;"
    });

    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);

    link.setAttribute("href", url);
    link.setAttribute(
        "download",
        `no-task-employees-${new Date().toISOString().split("T")[0]}.csv`
    );

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

async function run() {
    const status = document.getElementById("status");
    const tbody = document.getElementById("results");
    const exportBtn = document.getElementById("exportBtn");

    tbody.innerHTML = "";
    latestData = [];
    exportBtn.style.display = "none";
    status.innerText = "Fetching managers...";

    try {
        let managers = await getManagers();

        // Skip this manager entirely
        managers = managers.filter(manager => manager.name !== "Shanu Manager");

        const includeCEO = document.getElementById("includeCEO").checked;

        if (includeCEO) {
            const ceoExists = managers.some(
                m => m.name === "Ankit Anil Bhargava"
            );

            if (!ceoExists) {
                managers.push({
                    name: "Ankit Anil Bhargava"
                });
            }
        }

        // key => employee
        // value => { empId, name, managers: Set }
        const employeeMap = new Map();

        for (const manager of managers) {
            status.innerText = `Checking ${manager.name}...`;

            try {
                const noTaskEmployees = await getNoTaskEmployees(manager.name);

                noTaskEmployees.forEach(emp => {
                    const empId = String(emp.empId || "").trim();
                    const fullName = `${emp.firstName || ""} ${emp.lastName || ""}`.trim();

                    // Prefer empId for uniqueness, fallback to name if missing
                    const uniqueKey = empId || fullName.toLowerCase();

                    if (!employeeMap.has(uniqueKey)) {
                        employeeMap.set(uniqueKey, {
                            empId,
                            name: fullName,
                            managers: new Set()
                        });
                    }

                    employeeMap.get(uniqueKey).managers.add(manager.name);
                });

            } catch (error) {
                console.error("Error fetching for:", manager.name, error);
            }
        }

        const mergedList = Array.from(employeeMap.values()).map(emp => ({
            empId: emp.empId,
            name: emp.name,
            managers: Array.from(emp.managers).sort((a, b) => a.localeCompare(b))
        }));

        // Sort employees by name
        mergedList.sort((a, b) => a.name.localeCompare(b.name));

        renderTable(mergedList);

        latestData = mergedList;
        exportBtn.style.display = mergedList.length ? "inline-block" : "none";

        status.innerText = `Done. Found ${mergedList.length} unique employees with no tasks.`;

    } catch (error) {
        console.error(error);
        status.innerText = "Something went wrong.";
    }
}
</script>

</body>
</html>
